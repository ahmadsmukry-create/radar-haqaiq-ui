<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الحقائق التفاعلي</title>
    <style>
        :root { --main-green: #00ff00; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* تأثير النبض للرادار */
        .radar-circle { width: 200px; height: 200px; border: 2px solid var(--main-green); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        .radar-circle::after { content: ''; width: 100%; height: 100%; border: 1px solid var(--main-green); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .mic-btn { background: none; border: none; cursor: pointer; z-index: 10; transition: transform 0.3s; }
        .mic-btn:active { transform: scale(0.9); }
        .mic-btn svg { fill: var(--main-green); width: 60px; height: 60px; filter: drop-shadow(0 0 10px var(--main-green)); }

        .status-text { margin-top: 20px; font-size: 14px; color: var(--main-green); letter-spacing: 1px; text-transform: uppercase; }
        
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 10px 20px; border: 1px solid var(--main-green); background: transparent; color: var(--main-green); cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn.active { background: var(--main-green); color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="radar-circle">
        <button class="mic-btn" id="start-btn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>

    <div class="status-text" id="status">الرادار جاهز للمسح...</div>

    <div class="controls">
        <button class="btn active" onclick="setRadar('eco')">رادار اقتصادي</button>
        <button class="btn" onclick="setRadar('pol')">رادار سياسي</button>
    </div>

    <script>
        let currentRadar = 'eco';
        
        function setRadar(type) {
            currentRadar = type;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('status').innerText = `تم التبديل إلى ${type === 'eco' ? 'المحلل الاقتصادي' : 'المحلل السياسي'}`;
        }

        // هنا سنضيف كود Gemini Live لاحقاً
    </script>
</body>
</html>
