<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الحقائق التفاعلي 2026</title>
    <style>
        :root { --main-green: #00ff00; --dark-bg: #0a0a0a; --accent-red: #ff4444; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .radar-circle { width: 220px; height: 220px; border: 2px solid var(--main-green); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .radar-circle.listening { border-color: var(--accent-red); box-shadow: 0 0 30px var(--accent-red); }
        .radar-circle.speaking { box-shadow: 0 0 30px var(--main-green); }

        .mic-btn { background: none; border: none; cursor: pointer; z-index: 10; outline: none; }
        .mic-btn svg { fill: var(--main-green); width: 80px; height: 80px; transition: 0.3s; }
        .listening svg { fill: var(--accent-red); transform: scale(1.1); }

        .status-text { margin-top: 25px; font-size: 16px; color: var(--main-green); font-weight: 300; min-height: 50px; text-align: center; padding: 0 20px; max-width: 80%; line-height: 1.5; }
        .error-text { color: var(--accent-red); font-weight: bold; }
        
        .controls { margin-top: 40px; display: flex; gap: 20px; }
        .btn { padding: 12px 25px; border: 1px solid var(--main-green); background: transparent; color: var(--main-green); cursor: pointer; border-radius: 30px; font-size: 14px; transition: 0.3s; }
        .btn.active { background: var(--main-green); color: black; font-weight: bold; box-shadow: 0 0 15px var(--main-green); }
    </style>
</head>
<body>

    <div class="radar-circle" id="radar-ui">
        <button class="mic-btn" id="mic-btn">
            <svg viewBox="0 0 24 24" id="mic-icon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>

    <div class="status-text" id="status-display">الرادار جاهز للمسح الاستخباراتي...</div>

    <div class="controls">
        <button class="btn active" id="eco-btn">رادار اقتصادي</button>
        <button class="btn" id="pol-btn">رادار سياسي</button>
    </div>

    <script>
        let currentRadar = 'eco';
        let isListening = false;
        const statusDisplay = document.getElementById('status-display');
        const radarUI = document.getElementById('radar-ui');

        document.getElementById('eco-btn').onclick = () => switchRadar('eco');
        document.getElementById('pol-btn').onclick = () => switchRadar('pol');

        function switchRadar(type) {
            currentRadar = type;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(type === 'eco' ? 'eco-btn' : 'pol-btn').classList.add('active');
            statusDisplay.className = 'status-text';
            statusDisplay.innerText = `تم تنشيط ${type === 'eco' ? 'المحلل الاقتصادي' : 'المحلل السياسي'}`;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';

        document.getElementById('mic-btn').onclick = () => {
            if (isListening) return;
            recognition.start();
        };

        recognition.onstart = () => {
            isListening = true;
            radarUI.classList.add('listening');
            statusDisplay.className = 'status-text';
            statusDisplay.innerText = "جاري الاستماع إليك...";
        };

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            
            try {
                // الخطوة 1
                statusDisplay.innerText = `1. تم استلام سؤالك. جاري إرسال العناكب لجلب الأخبار...`;
                const newsResponse = await fetch(`/api/news?q=${encodeURIComponent(userText)}`);
                if (!newsResponse.ok) throw new Error("فشل العناكب في الوصول للأخبار.");
                const newsContext = await newsResponse.text();

                // الخطوة 2
                statusDisplay.innerText = `2. تم جلب الأخبار. جاري إرسالها لمحلل Gemini...`;
                const chatResponse = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userText,
                        context: newsContext.substring(0, 3000),
                        radarType: currentRadar === 'eco' ? 'اقتصادي' : 'سياسي'
                    })
                });

                if (!chatResponse.ok) {
                    const errText = await chatResponse.text();
                    throw new Error("سيرفر Gemini يرفض الطلب: " + errText);
                }

                const chatData = await chatResponse.json();
                if (chatData.error) throw new Error("خطأ من جوجل: " + chatData.error.message);

                const aiResponse = chatData.candidates[0].content.parts[0].text;

                // الخطوة 3
                statusDisplay.innerText = "3. المحلل يتحدث الآن...";
                speak(aiResponse);

            } catch (error) {
                // هنا سيتوقف ويعرض لك الخطأ الحقيقي ولن يمسحه فوراً!
                radarUI.classList.remove('listening');
                statusDisplay.className = 'status-text error-text';
                statusDisplay.innerText = "🚨 " + error.message;
                setTimeout(stopUI, 8000); // سينتظر 8 ثوان لتقرأ الخطأ
            }
        };

        function speak(text) {
            radarUI.classList.remove('listening');
            radarUI.classList.add('speaking');
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.onend = stopUI;
            utterance.onerror = (e) => {
                statusDisplay.innerText = "🚨 خطأ في نطق الصوت من المتصفح.";
                setTimeout(stopUI, 5000);
            };
            window.speechSynthesis.speak(utterance);
        }

        function stopUI() {
            isListening = false;
            radarUI.classList.remove('listening', 'speaking');
            statusDisplay.className = 'status-text';
            statusDisplay.innerText = "الرادار جاهز لمسح جديد...";
        }
    </script>
</body>
</html>
